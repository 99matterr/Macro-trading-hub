<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS GLOBAL RESEARCH // ECONOMIC CALENDAR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020203; color: #d4d4d8; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020203; }
        ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 2px; }
        .active-tab { color: #06b6d4 !important; border-bottom: 2px solid #06b6d4 !important; }
    </style>
</head>
<body class="bg-[#020203] text-zinc-300 font-sans antialiased min-h-screen flex flex-col justify-between">

    <div id="global-header"></div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-10 space-y-6">
        
        <div class="border-b border-zinc-900 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 font-mono">
            <div>
                <h1 class="text-base sm:text-lg font-bold text-white uppercase tracking-wider">Economic Calendar</h1>
                <p class="text-xs text-zinc-500 mt-1">// Quantitative Macro Aggregation Feed</p>
            </div>
            <a href="tools-hub.html" class="font-mono text-[11px] text-zinc-400 hover:text-cyan-400 transition-colors border border-zinc-800 bg-[#08080c] px-3 py-1.5 rounded-lg">
                &larr; BACK TO TOOLS HUB
            </a>
        </div>

        <div class="bg-[#040406] border border-zinc-900 rounded-xl p-4 flex items-center justify-between font-mono text-[11px]">
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-cyan-500 animate-pulse"></span>
                <span class="text-zinc-400 font-medium uppercase tracking-wide">Active Filters:</span>
            </div>
            <button class="bg-[#18181b] border border-cyan-500/30 text-cyan-400 px-4 py-1.5 rounded uppercase tracking-wider font-semibold shadow-[0_0_10px_rgba(6,182,212,0.05)] select-none">
                G11 Macro Matrices Selected
            </button>
        </div>

        <div class="bg-white border border-zinc-900 rounded-xl p-1 h-[1100px] w-full shadow-2xl overflow-hidden">
            <iframe id="investing-calendar-iframe" 
                    src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&features=datepicker,timezone&countries=5,72,4,25,12,32,6,22,17,35,37&calType=week&timeZone=8&lang=1" 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    allowtransparency="true" 
                    marginwidth="0" 
                    marginheight="0"
                    class="w-full h-full rounded-lg">
            </iframe>
        </div>
        
        <div class="font-mono text-[10px] text-zinc-600 text-right pt-1 select-none">
            Real Time Economic Calendar provided by <a href="https://www.investing.com/" rel="nofollow" target="_blank" class="text-zinc-400 hover:text-cyan-400 font-bold underline">Investing.com</a>.
        </div>
    </main>

    <div id="global-footer"></div>

    <script src="inject-engine.js"></script>
</body>
</html>
