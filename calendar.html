<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS GLOBAL RESEARCH // ECONOMIC CALENDAR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020203; color: #d4d4d8; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020203; }
        ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 2px; }
        .active-tab { color: #06b6d4 !important; border-bottom: 2px solid #06b6d4 !important; }
    </style>
</head>
<body class="bg-[#020203] text-zinc-300 font-sans antialiased min-h-screen flex flex-col justify-between">

    <div id="global-header"></div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-10 space-y-6">
        
        <div class="border-b border-zinc-900 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 font-mono">
            <div>
                <h1 class="text-base sm:text-lg font-bold text-white uppercase tracking-wider">Economic Calendar</h1>
                <p class="text-xs text-zinc-500 mt-1">// Quantitative Macro Aggregation Feed</p>
            </div>
            <a href="tools-hub.html" class="font-mono text-[11px] text-zinc-400 hover:text-cyan-400 transition-colors border border-zinc-800 bg-[#08080c] px-3 py-1.5 rounded-lg">
                &larr; BACK TO TOOLS HUB
            </a>
        </div>

        <div class="bg-[#040406] border border-zinc-900 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 font-mono text-[11px] relative z-40">
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-cyan-500 animate-pulse"></span>
                <span class="text-zinc-400 font-medium uppercase tracking-wide">Data Feeds Strategy:</span>
            </div>
            
            <div class="relative inline-block text-left w-full sm:w-auto">
                <button onclick="toggleDropdownMenu()" class="w-full sm:w-64 bg-[#020203] border border-zinc-800 text-zinc-300 px-4 py-2 rounded flex items-center justify-between hover:text-white hover:border-zinc-700 transition-all font-semibold uppercase tracking-wider">
                    <span id="dropdown-label">All Major Economies</span>
                    <span class="text-[9px] text-zinc-500 font-sans">&#9660;</span>
                </button>
                
                <div id="dropdown-menu-box" class="hidden absolute right-0 mt-2 w-full sm:w-64 rounded-lg bg-[#060609] border border-zinc-900 shadow-2xl p-3 space-y-2 max-h-64 overflow-y-auto">
                    <div class="text-[9px] text-zinc-600 uppercase border-b border-zinc-900 pb-1 font-bold tracking-widest">// TARGET COUNTRIES</div>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="5"  checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> United States</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="72" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Eurozone</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="4"  checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> United Kingdom</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="25" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Australia</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="12" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Switzerland</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="32" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> New Zealand</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="6"  checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Canada</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="22" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> France</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="17" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Germany</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="35" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> Japan</label>
                    <label class="flex items-center gap-2.5 text-zinc-300 hover:text-white cursor-pointer py-0.5"><input type="checkbox" value="37" checked onchange="rebuildWidgetMatrix()" class="rounded bg-[#020203] border-zinc-800 text-cyan-500 focus:ring-0"> China</label>
                </div>
            </div>
        </div>

        <!-- id added for JS width measurement; bg-white removed (dead zone was white from this) -->
        <div id="calendar-container" class="relative w-full overflow-hidden rounded-xl border border-zinc-900 shadow-2xl h-[920px] z-10">
            <!-- src starts as about:blank — JS sets the real URL after measuring container width -->
            <iframe id="investing-calendar-iframe"
                    src="about:blank"
                    height="1100px"
                    frameborder="0"
                    allowtransparency="true"
                    marginwidth="0"
                    marginheight="0"
                    style="width: 100%; display: block; margin-bottom: -180px;">
            </iframe>
        </div>
        
        <div class="font-mono text-[10px] text-zinc-600 text-right pt-1 select-none">
            Real Time Economic Calendar provided by <a href="https://www.investing.com/" rel="nofollow" target="_blank" class="text-zinc-400 hover:text-cyan-400 font-bold underline">Investing.com</a>.
        </div>
    </main>

    <div id="global-footer"></div>

    <script src="inject-engine.js"></script>
    <script>
        // ── Constants ──────────────────────────────────────────────────────────────
        const DEFAULT_COUNTRIES = '5,72,4,25,12,32,6,22,17,35,37';
        const CAL_BASE = 'https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&features=datepicker,timezone';
        const CAL_TAIL = '&calType=week&timeZone=8&lang=1';

        // ── Helpers ────────────────────────────────────────────────────────────────

        /** Returns the container's pixel width, used as the &width= param so
         *  Investing.com renders its table to exactly fill the available space. */
        function getContainerWidth() {
            const container = document.getElementById('calendar-container');
            // Subtract 2px for the 1px border on each side
            return Math.max(600, Math.floor(container.offsetWidth) - 2);
        }

        /** Builds the full Investing.com embed URL with a pixel-accurate width param. */
        function buildCalendarSrc(countryIds) {
            const w = getContainerWidth();
            return `${CAL_BASE}&countries=${countryIds}${CAL_TAIL}&width=${w}`;
        }

        // ── Dropdown ───────────────────────────────────────────────────────────────

        function toggleDropdownMenu() {
            document.getElementById('dropdown-menu-box').classList.toggle('hidden');
        }

        window.addEventListener('click', function (e) {
            if (!e.target.closest('button') && !e.target.closest('#dropdown-menu-box')) {
                document.getElementById('dropdown-menu-box').classList.add('hidden');
            }
        });

        // ── Widget rebuild (called by checkboxes) ──────────────────────────────────

        function rebuildWidgetMatrix() {
            const iframe       = document.getElementById('investing-calendar-iframe');
            const label        = document.getElementById('dropdown-label');
            const checkedBoxes = document.querySelectorAll('#dropdown-menu-box input[type="checkbox"]:checked');
            const ids          = Array.from(checkedBoxes).map(b => b.value);

            if (ids.length === 0) {
                label.textContent = 'No Channels Selected';
                return;
            }

            label.textContent = checkedBoxes.length === 11 ? 'All Major Economies' : `${checkedBoxes.length} Markets Selected`;
            iframe.src = buildCalendarSrc(ids.join(','));
        }

        // ── Initialisation ─────────────────────────────────────────────────────────

        // Set the real URL once the layout has been painted (so offsetWidth is accurate)
        window.addEventListener('DOMContentLoaded', function () {
            document.getElementById('investing-calendar-iframe').src = buildCalendarSrc(DEFAULT_COUNTRIES);
        });

        // Re-measure and reload if the viewport is resized (debounced to avoid thrashing)
        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                const checked = document.querySelectorAll('#dropdown-menu-box input[type="checkbox"]:checked');
                const ids     = Array.from(checked).map(b => b.value).join(',') || DEFAULT_COUNTRIES;
                document.getElementById('investing-calendar-iframe').src = buildCalendarSrc(ids);
            }, 400);
        });
    </script>
</body>
</html>
