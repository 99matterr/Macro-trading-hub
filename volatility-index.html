<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS GLOBAL RESEARCH // VOLATILITY MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020203; color: #d4d4d8; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020203; }
        ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 2px; }
        .active-tab { color: #06b6d4 !important; border-bottom: 2px solid #06b6d4 !important; }
    </style>
</head>
<body class="bg-[#020203] text-zinc-300 font-sans antialiased min-h-screen flex flex-col justify-between">

    <div id="global-header"></div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-10 space-y-6">
        <!-- Clean, Vertically Spaced Header Engine Block -->
        <div class="border-b border-zinc-900 pb-5 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 font-mono">
            <div class="w-full">
                <!-- Row 1: Main Title -->
                <h1 class="text-base sm:text-lg font-bold text-white uppercase tracking-wider">Currency Pair Daily Average Volatility</h1>
                
                <!-- Row 2: Subtitle Matrix (With spacing below title) -->
                <p class="text-xs text-zinc-500 mt-2">// Statistical Mean Realized Variance Matrix</p>
                
                <!-- 
                  AI MEMORY/REMINDER LEDGER NOTE: 
                  ----------------------------------------------------------------------------------
                  CRITICAL LAYOUT RULE: Keep the Title, Subtitle, and Telemetry row split into THREE 
                  distinct vertical lines with clean margin separation (mt-2, mt-3).
                  
                  TIMESTAMP FORMAT RULE: The 'UPDATED WEEKLY' badge and current cycle bracket MUST 
                  live on a single unified horizontal line. The date parameters must ALWAYS display 
                  the specific current trading week span running from [ SUN MMM DD – FRI MMM DD, YYYY ] 
                  based on the most recent market open and close dates relative to the update request.
                  ----------------------------------------------------------------------------------
                -->
                <!-- Row 3: Telemetry Sync Group (Sunday to Friday Trading Week Span) -->
                <div class="flex items-center gap-x-3 mt-3 text-xs">
                    <div class="flex items-center gap-1.5">
                        <!-- Neon Warning Pulse Dot -->
                        <span class="relative flex h-1.5 w-1.5">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-cyan-500"></span>
                        </span>
                        <!-- Glowing text signature -->
                        <span class="text-[11px] text-cyan-400 font-bold tracking-wider uppercase drop-shadow-[0_0_6px_rgba(6,182,212,0.5)]">
                            UPDATED WEEKLY
                        </span>
                    </div>
                    
                    <span class="text-zinc-800">|</span>
                    
                    <span class="text-[10px] text-zinc-600 font-medium tracking-wide uppercase">
                        [ CURRENT CYCLE: SUN JUN 28 – FRI JUL 03, 2026 ]
                    </span>
                </div>
            </div>
            
            <!-- Back Navigation Button Anchor Link -->
            <a href="tools-hub.html" class="shrink-0 font-mono text-[11px] text-zinc-400 hover:text-cyan-400 transition-colors border border-zinc-800 bg-[#08080c] px-3 py-1.5 rounded-lg mb-1">
                &larr; BACK TO TOOLS HUB
            </a>
        </div>

        <div class="bg-[#08080c] border border-zinc-900 rounded-xl p-6 overflow-x-auto">
            <table class="w-full text-left font-mono text-sm select-none">
                <thead>
                    <tr class="text-[10px] text-zinc-500 border-b border-zinc-900 uppercase">
                        <th class="pb-4 font-medium pl-4">Pair Symbol</th>
                        <th class="pb-4 font-medium text-right">Avg Daily Pips</th>
                        <th class="pb-4 font-medium text-right">$ Cash Value (100k)</th>
                        <th class="pb-4 font-medium text-right pr-4">% Realized Range</th>
                    </tr>
                </thead>
                <tbody id="currency-table-body" class="divide-y divide-zinc-900/40">
                </tbody>
            </table>
        </div>
    </main>

    <div id="global-footer"></div>

    <script src="inject-engine.js"></script>
    <script>

        };

        function buildSortedCurrencyIndexTable() {
            const tbody = document.getElementById('currency-table-body');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            const sortedKeys = Object.keys(assetProfiles).sort();
            sortedKeys.forEach(key => {
                const item = assetProfiles[key];
                const row = document.createElement('tr');
                row.className = "hover:bg-zinc-900/40 transition-colors border-b border-zinc-900/20 text-zinc-400 font-medium text-right";
                row.innerHTML = `
                    <td class="py-4 text-left font-bold text-zinc-200 pl-4">${item.name}</td>
                    <td class="py-4 pr-1 tabular-nums">${item.pips}</td>
                    <td class="py-4 pr-1 tabular-nums text-zinc-500">$${item.cash}</td>
                    <td class="py-4 pr-4 tabular-nums text-cyan-400 font-bold">${item.pct}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', buildSortedCurrencyIndexTable);
        } else {
            buildSortedCurrencyIndexTable();
        }
    </script>
</body>
</html>
