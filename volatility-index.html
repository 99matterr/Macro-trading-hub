<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIROS GLOBAL RESEARCH // VOLATILITY MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020203; color: #d4d4d8; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020203; }
        ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 2px; }
        .active-tab { color: #06b6d4 !important; border-bottom: 2px solid #06b6d4 !important; }
    </style>
</head>
<body class="bg-[#020203] text-zinc-300 font-sans antialiased min-h-screen flex flex-col justify-between">

    <div id="global-header"></div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-10 space-y-6">
        <div class="border-b border-zinc-900 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 font-mono">
            <div>
                <h1 class="text-base sm:text-lg font-bold text-white uppercase tracking-wider">Currency Pair Daily Average Volatility</h1>
                <p class="text-xs text-zinc-500 mt-1">// Statistical Mean Realized Variance Matrix</p>
            </div>
            <a href="tools-hub.html" class="font-mono text-[11px] text-zinc-400 hover:text-cyan-400 transition-colors border border-zinc-800 bg-[#08080c] px-3 py-1.5 rounded-lg">
                &larr; BACK TO TOOLS HUB
            </a>
        </div>

        <div class="bg-[#08080c] border border-zinc-900 rounded-xl p-6 overflow-x-auto">
            <table class="w-full text-left font-mono text-sm select-none">
                <thead>
                    <tr class="text-[10px] text-zinc-500 border-b border-zinc-900 uppercase">
                        <th class="pb-4 font-medium pl-4">Pair Symbol</th>
                        <th class="pb-4 font-medium text-right">Avg Daily Pips</th>
                        <th class="pb-4 font-medium text-right">$ Cash Value (100k)</th>
                        <th class="pb-4 font-medium text-right pr-4">% Realized Range</th>
                    </tr>
                </thead>
                <tbody id="currency-table-body" class="divide-y divide-zinc-900/40">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="global-footer"></div>

    <script src="inject-engine.js"></script>
    <script>
        // Core asset profile data array matrix
        const assetProfiles = {
            AUDCAD: { name: "AUDCAD", pips: "57.660", cash: "406.17", pct: "0.59%" },
            AUDCHF: { name: "AUDCHF", pips: "29.628", cash: "365.87", pct: "0.53%" },
            AUDJPY: { name: "AUDJPY", pips: "82.456", cash: "509.77", pct: "0.74%" },
            AUDNZD: { name: "AUDNZD", pips: "52.478", cash: "295.87", pct: "0.43%" },
            AUDUSD: { name: "AUDUSD", pips: "54.224", cash: "542.24", pct: "0.79%" },
            CADCHF: { name: "CADCHF", pips: "26.082", cash: "322.08", pct: "0.46%" },
            CADJPY: { name: "CADJPY", pips: "59.078", cash: "365.24", pct: "0.52%" },
            CHFJPY: { name: "CHFJPY", pips: "112.866", cash: "697.78", pct: "0.57%" },
            EURAUD: { name: "EURAUD", pips: "81.136", cash: "559.43", pct: "0.49%" },
            EURCAD: { name: "EURCAD", pips: "61.960", cash: "436.46", pct: "0.38%" },
            EURCHF: { name: "EURCHF", pips: "28.200", cash: "348.23", pct: "0.31%" },
            EURGBP: { name: "EURGBP", pips: "25.434", cash: "335.68", pct: "0.29%" },
            EURJPY: { name: "EURJPY", pips: "93.782", cash: "579.80", pct: "0.51%" },
            EURNZD: { name: "EURNZD", pips: "110.990", cash: "625.76", pct: "0.55%" },
            EURUSD: { name: "EURUSD", pips: "58.322", cash: "583.22", pct: "0.51%" },
            GBPAUD: { name: "GBPAUD", pips: "93.448", cash: "644.32", pct: "0.49%" },
            GBPCAD: { name: "GBPCAD", pips: "82.448", cash: "580.78", pct: "0.44%" },
            GBPCHF: { name: "GBPCHF", pips: "40.476", cash: "499.83", pct: "0.38%" },
            GBPJPY: { name: "GBPJPY", pips: "120.334", cash: "743.95", pct: "0.56%" },
            GBPNZD: { name: "GBPNZD", pips: "131.488", cash: "741.33", pct: "0.56%" },

            NZDJPY: { name: "NZDJPY", pips: "73.582", cash: "454.91", pct: "0.56%" }
        };

        function buildSortedCurrencyIndexTable() {
            const tbody = document.getElementById('currency-table-body');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            const sortedKeys = Object.keys(assetProfiles).sort();
            sortedKeys.forEach(key => {
                const item = assetProfiles[key];
                const row = document.createElement('tr');
                row.className = "hover:bg-zinc-900/40 transition-colors border-b border-zinc-900/20 text-zinc-400 font-medium text-right";
                row.innerHTML = `
                    <td class="py-4 text-left font-bold text-zinc-200 pl-4">${item.name}</td>
                    <td class="py-4 pr-1 tabular-nums">${item.pips}</td>
                    <td class="py-4 pr-1 tabular-nums text-zinc-600">$${item.cash}</td>
                    <td class="py-4 pr-4 tabular-nums text-cyan-400 font-bold">${item.pct}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // Wait briefly for elements to initialize then structure content cards
        window.addEventListener('load', buildSortedCurrencyIndexTable);
    </script>
</body>
</html>
